[MikroTik]
    input_ready = "[admin@MikroTik] >"
    login = "admin"
    password = "test"
    network_stack = "MikroTik network stack"
    routing_stack = "MikroTik routing stack"
    interface_prefix = "ether"
    interfaces_start_at =  1
    image_path = "/home/julien/Programmation/vm/MikroTik/chr-6.49.18.img"
    resources_monitor_commands = [
        """{\r\n
    :put ("Total (MiB)    Free (MiB)    Used (MiB)    CPU (perc)")\r\n
    :while (true) do={\r\n
        :local total [/system resource get total-memory]\r\n
        :local free [/system resource get free-memory]\r\n
        :local used ($total - $free)\r\n
        :local cpu [/system resource get cpu-load]\r\n

        :local totalMiB (($total * 10) / 1048576)\r\n
        :local freeMiB  (($free * 10) / 1048576)\r\n
        :local usedMiB  (($used * 10) / 1048576)\r\n

        :put (($totalMiB / 10) . "." . ($totalMiB % 10) . "    " . \\\r\n
              ($freeMiB / 10)  . "." . ($freeMiB % 10) . "    " . \\\r\n
              ($usedMiB / 10)  . "." . ($usedMiB % 10) . "    " . $cpu)\r\n

        :delay 1\r\n
    }\r\n
}\r\n""",
        { expect = "", wait = 60_000_000 },
        { expect = "", control = 'c' }
    ]

