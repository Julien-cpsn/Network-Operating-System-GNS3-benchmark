[BSDRP_BIRD2]
    input_ready = ":~"
    login = "root"
    #password = null
    network_stack = "FreeBSD network stack"
    routing_stack = "BIRD2"
    interface_prefix = [
        ["E1000", "em"],
        ["RTL8139", "re"],
        ["VirtIO", "vtnet"]
    ]
    interfaces_start_at = 0
    image_path = "/home/julien/Programmation/vm/BSDRP/BSDRP-1.993-full-amd64-serial.img"
    resources_monitor_commands = [
        """printf "Total (MiB)\\tFree (MiB)\\tUsed (MiB)\\tCPU (perc)\\n" &&
while true
do
   vmstat -H | awk 'FNR == 3 {printf("%s\\t%s\\t%s\\t", int($5/1000000), int(($5-$4)/1000000), int($4/1000000))}' && top -d 1 0 | awk '/CPU:  /{printf("%s\\n", substr($2, 1, length($2)-1))}' && sleep 1
done""",
        { expect = "", wait = 60_000_000 },
        { expect = "", control = 'c' }
    ]

